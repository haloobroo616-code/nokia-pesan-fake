<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nokia Message Generator - Standalone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,400&display=swap">
    <style>
        /* Memuat font Nokia khusus */
        @font-face {
            font-family: 'NokiaFont';
            src: url('https://raw.githubusercontent.com/Ditzzx-vibecoder/Assets/main/Font/nokia-6000-series-medium.ttf');
        }
        
        body {
            background-color: #F4F4F1;
            font-family: 'Inter', sans-serif;
            color: #1A1A1A;
            margin: 0;
            overflow-x: hidden;
        }

        .nokia-canvas {
            max-height: 70vh;
            width: auto;
            background: #E8F0F0;
            display: block;
            box-shadow: 0 40px 100px rgba(0,0,0,0.12);
        }

        /* Input Range Styling */
        input[type=range] {
            accent-color: #1A1A1A;
        }

        .custom-loader {
            width: 24px;
            height: 24px;
            border: 2px solid #D9D9D6;
            border-top: 2px solid #1A1A1A;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="p-6 border-b border-[#D9D9D6] bg-white z-20 shrink-0">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div>
                <h1 class="text-[10px] font-bold tracking-[0.2em] uppercase text-[#888883] mb-1">Pembuat Pesan Nokia</h1>
                <p class="text-2xl font-serif italic">Nokia Vibe v2.4</p>
            </div>
            <button onclick="resetToDefault()" class="p-3 border border-[#D9D9D6] hover:border-[#1A1A1A] transition-colors rounded-full" title="Reset">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
            </button>
        </div>
    </header>

    <!-- Kontrol Editor -->
    <div class="bg-white border-b border-[#D9D9D6] shadow-sm relative z-10">
        <div class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Kolom 1: Identitas -->
            <section class="space-y-4">
                <div class="flex items-center gap-4">
                    <span class="text-[10px] font-bold uppercase tracking-widest">Identitas</span>
                    <span class="h-px flex-1 bg-[#D9D9D6]"></span>
                </div>
                <div class="space-y-3">
                    <div class="space-y-1">
                        <label class="text-[10px] text-[#888883] uppercase">Judul Atas</label>
                        <input id="headerInp" type="text" oninput="update('headerText', this.value)" class="w-full text-xs p-2 border border-[#E5E5E1] bg-[#F9F9F7] focus:outline-none focus:border-[#1A1A1A]">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] text-[#888883] uppercase">Pengirim</label>
                        <input id="senderInp" type="text" oninput="update('sender', this.value)" class="w-full text-xs p-2 border border-[#E5E5E1] bg-[#F9F9F7] focus:outline-none focus:border-[#1A1A1A]">
                    </div>
                </div>
            </section>

            <!-- Kolom 2: Pesan -->
            <section class="space-y-4">
                <div class="flex items-center gap-4">
                    <span class="text-[10px] font-bold uppercase tracking-widest">Pesan</span>
                    <span class="h-px flex-1 bg-[#D9D9D6]"></span>
                </div>
                <div class="space-y-2">
                    <textarea id="messageInp" rows="3" oninput="update('messageText', this.value)" class="w-full text-xs p-2 border border-[#E5E5E1] bg-[#F9F9F7] focus:outline-none focus:border-[#1A1A1A] resize-none leading-relaxed"></textarea>
                    <div class="grid grid-cols-2 gap-2">
                        <input id="dateInp" type="text" oninput="update('date', this.value)" class="w-full text-[10px] p-2 border border-[#E5E5E1] bg-[#F9F9F7] focus:outline-none">
                        <input id="timeInp" type="text" oninput="update('time', this.value)" class="w-full text-[10px] p-2 border border-[#E5E5E1] bg-[#F9F9F7] focus:outline-none">
                    </div>
                </div>
            </section>

            <!-- Kolom 3: Penyesuaian -->
            <section class="space-y-4">
                <div class="flex items-center gap-4">
                    <span class="text-[10px] font-bold uppercase tracking-widest">Penyesuaian</span>
                    <span class="h-px flex-1 bg-[#D9D9D6]"></span>
                </div>
                <div class="space-y-4">
                    <div class="space-y-2">
                        <div class="flex justify-between text-[9px] uppercase font-bold text-[#888883]">
                            <span>Ukuran Font</span>
                            <span id="fontSizeDisplay" class="font-mono text-black">63px</span>
                        </div>
                        <input id="fontSizeInp" type="range" min="40" max="100" oninput="update('fontSize', parseInt(this.value))" class="w-full cursor-pointer">
                    </div>
                    <button onclick="downloadImage()" class="w-full text-[10px] font-bold tracking-[0.2em] uppercase py-3 border border-[#1A1A1A] hover:bg-black hover:text-white transition-all flex items-center justify-center gap-2">
                        Unduh Gambar
                    </button>
                </div>
            </section>
        </div>
    </div>

    <!-- Area Preview -->
    <main class="flex-1 bg-[#EBEBE8] p-8 flex flex-col items-center justify-center overflow-y-auto relative">
        <!-- Loading Overlay -->
        <div id="loader" class="absolute inset-0 z-20 flex flex-col items-center justify-center bg-white/90 backdrop-blur-sm">
            <div class="custom-loader mb-4"></div>
            <p class="text-[9px] font-bold uppercase tracking-[0.3em] text-[#888883]">Memuat Aset...</p>
        </div>

        <div class="relative bg-white p-2 border border-[#D9D9D6]" style="max-width: 95%; display: flex; justify-content: center;">
            <canvas id="nokiaCanvas" width="1086" height="1448" class="nokia-canvas" style="max-width: 100%; height: auto; max-height: 65vh; width: auto;"></canvas>
        </div>
        
        <div class="mt-8 text-[10px] font-bold uppercase tracking-[0.2em] text-[#888883]">
            Dev: Andri
        </div>
    </main>

    <script>
        const BG_URL = "https://raw.githubusercontent.com/Ditzzx-vibecoder/Assets/main/Image/file_00000000a9f47208a295c9c984f92b7a.jpeg";
        const FONT_NAME = 'NokiaFont';
        
        const canvas = document.getElementById('nokiaCanvas');
        const ctx = canvas.getContext('2d');
        let bgImg = new Image();
        let isReady = false;

        // Konfigurasi Awal
        let config = {
            headerText: "Andri",
            messageText: "di benci ga masalah di sukai makasih, bee your self, berdiri di atas kaki sendiri🫷",
            sender: "Andri",
            date: "02/05/2026",
            time: "11:28",
            fontSize: 63,
            lineHeight: 110,
            letterSpacing: "5px",
            scaleY: 1.3
        };

        function update(key, value) {
            config[key] = value;
            if (key === 'fontSize') document.getElementById('fontSizeDisplay').innerText = value + 'px';
            draw();
        }

        function resetToDefault() {
            config = {
                headerText: "Andri",
                messageText: "di benci ga masalah di sukai makasih, bee your self, berdiri di atas kaki sendiri🫷",
                sender: "Andri",
                date: "02/05/2026",
                time: "11:28",
                fontSize: 63,
                lineHeight: 110,
                letterSpacing: "5px",
                scaleY: 1.3
            };
            syncInputs();
            draw();
        }

        function syncInputs() {
            document.getElementById('headerInp').value = config.headerText;
            document.getElementById('senderInp').value = config.sender;
            document.getElementById('messageInp').value = config.messageText;
            document.getElementById('dateInp').value = config.date;
            document.getElementById('timeInp').value = config.time;
            document.getElementById('fontSizeInp').value = config.fontSize;
            document.getElementById('fontSizeDisplay').innerText = config.fontSize + 'px';
        }

        function wrapText(text, maxW, fontSize) {
            ctx.font = fontSize + "px " + FONT_NAME;
            if ('letterSpacing' in ctx) ctx.letterSpacing = config.letterSpacing;
            
            const words = text.split(" ");
            const lines = [];
            let currentLine = "";

            for (let n = 0; n < words.length; n++) {
                const testLine = currentLine + words[n] + " ";
                const metrics = ctx.measureText(testLine);
                if (metrics.width > maxW && n > 0) {
                    lines.push(currentLine);
                    currentLine = words[n] + " ";
                } else {
                    currentLine = testLine;
                }
            }
            lines.push(currentLine);
            return lines;
        }

        function draw() {
            if (!isReady) return;

            // Bersihkan Canvas
            ctx.clearRect(0, 0, 1086, 1448);
            
            // Gambar Background
            ctx.drawImage(bgImg, 0, 0, 1086, 1448);

            // 1. Gambar Header (Judul Atas)
            ctx.fillStyle = "#E8F0F0";
            ctx.font = "130px " + FONT_NAME;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            if ('letterSpacing' in ctx) ctx.letterSpacing = "0px";
            for (let i = 0; i <= 4; i++) {
                ctx.fillText(config.headerText, 543 + i, 200);
            }

            // 2. Gambar Pesan Utama
            const padding = 60;
            const textX = padding;
            const textY = 320;
            const maxW = 1086 - (padding * 2);
            const maxH = 980 - textY - 20;

            const paragraphs = config.messageText.split("\n");
            let currentFontSize = config.fontSize;
            let wrappedLines = [];

            // Algoritma Fit-to-Height (Mengecilkan font jika teks terlalu panjang)
            while (currentFontSize > 10) {
                const currentLineHeight = currentFontSize * (110 / 63);
                wrappedLines = paragraphs.flatMap(p => wrapText(p, maxW, currentFontSize));
                if (wrappedLines.length * currentLineHeight <= maxH) break;
                currentFontSize -= 1;
            }

            const activeLineHeight = currentFontSize * (110 / 63);
            wrappedLines.forEach((line, i) => {
                ctx.save();
                const ly = textY + (i * activeLineHeight);
                ctx.translate(textX, ly);
                ctx.scale(1, config.scaleY);
                ctx.translate(-textX, -ly);
                
                ctx.font = currentFontSize + "px " + FONT_NAME;
                if ('letterSpacing' in ctx) ctx.letterSpacing = config.letterSpacing;
                ctx.fillStyle = "#000000";
                ctx.textAlign = "left";
                ctx.textBaseline = "top";
                ctx.fillText(line.trim(), textX, ly);
                ctx.restore();
            });

            // 3. Gambar Informasi (Dari, Tanggal, Jam)
            const infoLines = ["Dari:", config.sender, config.date, config.time];
            infoLines.forEach((line, i) => {
                ctx.save();
                const infoY = 980 + (i * 80);
                ctx.translate(textX, infoY);
                ctx.scale(1, 1.3);
                ctx.translate(-textX, -infoY);

                ctx.font = "48px " + FONT_NAME;
                if ('letterSpacing' in ctx) ctx.letterSpacing = "5px";
                ctx.fillStyle = "#000000";
                ctx.textAlign = "left";
                ctx.fillText(line, textX, infoY);
                ctx.restore();
            });
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'nokia-message-' + Date.now() + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // Pemuatan Aset dengan Optimized Logic
        async function init() {
            try {
                // Gunakan Promise.all untuk memuat font dan gambar secara paralel (lebih cepat)
                await Promise.all([
                    document.fonts.load('1em NokiaFont'),
                    new Promise((resolve, reject) => {
                        bgImg.crossOrigin = "anonymous";
                        bgImg.src = BG_URL;
                        bgImg.onload = resolve;
                        bgImg.onerror = reject;
                    })
                ]);
                
                isReady = true;
                document.getElementById('loader').style.display = 'none';
                syncInputs();
                draw();
            } catch (err) {
                console.error("Gagal memuat aset:", err);
                alert("Gagal memuat aset Nokia (Font/Gambar). Pastikan koneksi internet stabil.");
            }
        }

        // Mulai aplikasi
        init();
    </script>
</body>
</html>
